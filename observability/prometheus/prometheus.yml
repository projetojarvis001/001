global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'jarvis-agents'
    static_configs:
      - targets: ['192.168.215.1:9091']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grafana'
    static_configs:
      - targets: ['obs_grafana:3000']
