global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: jarvis-telegram

receivers:
  - name: jarvis-telegram
    webhook_configs:
      - url: 'http://192.168.8.121:3000/alerts/webhook'
        send_resolved: true
        max_alerts: 5
